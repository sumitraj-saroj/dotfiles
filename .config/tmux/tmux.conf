# ══════════════════════════════════════════════════════════════
#  tmux.conf — Catppuccin Mocha · Flat Segments · Ghostty
# ══════════════════════════════════════════════════════════════

# Config directory (change this if you move your tmux config)
set  -g  @cfg "~/.config/tmux"


# ── Prefix ────────────────────────────────────────────────────
set  -g  prefix   C-Space
set  -g  prefix2  C-b
bind C-Space send-prefix


# ── Reload ────────────────────────────────────────────────────
bind q source-file ~/.config/tmux/tmux.conf \; display "  Config reloaded"


# ── Vi Copy Mode ──────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


# ── Pane Controls ─────────────────────────────────────────────

# Split
bind -n M-Enter   split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
bind    h         split-window -v -c "#{pane_current_path}"
bind    v         split-window -h -c "#{pane_current_path}"

# Close
bind -n M-Escape kill-pane
bind    x        kill-pane

# Navigate
bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

# Resize
bind -n C-M-S-Left  resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up    resize-pane -U 5
bind -n C-M-S-Down  resize-pane -D 5


# ── Window Navigation ────────────────────────────────────────

bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

# Jump by number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Cycle / reorder
bind -n M-Left    select-window -t -1
bind -n M-Right   select-window -t +1
bind -n M-S-Left  swap-window   -t -1 \; select-window -t -1
bind -n M-S-Right swap-window   -t +1 \; select-window -t +1


# ── Session Controls ──────────────────────────────────────────

bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n


# ══════════════════════════════════════════════════════════════
#  General Settings
# ══════════════════════════════════════════════════════════════

# Terminal & colors (Ghostty)
set  -g  default-terminal   "tmux-256color"
set  -ag terminal-overrides  ",xterm-ghostty:RGB"
set  -ag terminal-features   "xterm-ghostty:extkeys"

# Input & behaviour
set  -g  mouse              on
set  -g  base-index         1
setw -g  pane-base-index    1
set  -g  renumber-windows   on
set  -g  history-limit      50000
set  -sg escape-time        10
set  -g  focus-events       on
set  -g  set-clipboard      on
set  -g  allow-passthrough  on
setw -g  aggressive-resize  on
set  -g  detach-on-destroy  off
set  -g  extended-keys      on
set  -g  extended-keys-format csi-u

# Titles
set  -g  set-titles         on
set  -g  set-titles-string  '#h ❐ #W'


# ══════════════════════════════════════════════════════════════
#  Catppuccin Mocha — Flat Segments
# ══════════════════════════════════════════════════════════════
#
#  Requires a Nerd Font in your terminal.
#  Check: fc-list | grep -i nerd
# ──────────────────────────────────────────────────────────────

# --- Palette ---
set -g @ctp_base     "#1e1e2e"
set -g @ctp_mantle   "#181825"
set -g @ctp_crust    "#11111b"
set -g @ctp_surface0 "#313244"
set -g @ctp_surface1 "#45475a"
set -g @ctp_surface2 "#585b70"
set -g @ctp_overlay0 "#6c7086"
set -g @ctp_overlay1 "#7f849c"
set -g @ctp_text     "#cdd6f4"
set -g @ctp_subtext0 "#a6adc8"
set -g @ctp_subtext1 "#bac2de"
set -g @ctp_blue     "#89b4fa"
set -g @ctp_lavender "#b4befe"
set -g @ctp_sapphire "#74c7ec"
set -g @ctp_sky      "#89dceb"
set -g @ctp_teal     "#94e2d5"
set -g @ctp_green    "#a6e3a1"
set -g @ctp_yellow   "#f9e2af"
set -g @ctp_peach    "#fab387"
set -g @ctp_maroon   "#eba0ac"
set -g @ctp_red      "#f38ba8"
set -g @ctp_mauve    "#cba6f7"
set -g @ctp_pink     "#f5c2e7"
set -g @ctp_flamingo "#f2cdcd"
set -g @ctp_rosewater "#f5e0dc"


# ── Status Bar ────────────────────────────────────────────────

set  -g  status-position       top
set  -g  status-interval       5
set  -g  status-style          "bg=#{@ctp_base},fg=#{@ctp_text}"

# Left: session block (swaps to peach PREFIX block when prefix active)
set  -g  status-left-length    40
set  -g  status-left           "#{?client_prefix,#[fg=#{@ctp_base}#,bg=#{@ctp_peach}#,bold]  PREFIX ,#[fg=#{@ctp_base}#,bg=#{@ctp_blue}#,bold] \uf489 #S }#[fg=default#,bg=default] "

# Right: path + clock
set  -g  status-right-length   100
set  -g  status-right          "#[fg=#{@ctp_subtext0},bg=#{@ctp_surface0}] #(#{@cfg}/scripts/right-status.sh '#{pane_current_path}') #[fg=#{@ctp_base},bg=#{@ctp_lavender},bold] \uf017 %H:%M "


# ── Window Tabs ───────────────────────────────────────────────

set  -g  window-status-separator ""
setw -g  automatic-rename       on
setw -g  automatic-rename-format '#{b:pane_current_path}'

# Inactive window
set  -g  window-status-format         "#[fg=#{@ctp_overlay1},bg=#{@ctp_surface0}] #I #(#{@cfg}/scripts/pane-icon.sh '#{pane_current_command}') #W "

# Active window
set  -g  window-status-current-format "#[fg=#{@ctp_base},bg=#{@ctp_green},bold] #I #(#{@cfg}/scripts/pane-icon.sh '#{pane_current_command}') #W "


# ── Borders & Messages ───────────────────────────────────────

set  -g  pane-border-style        "fg=#{@ctp_surface1}"
set  -g  pane-active-border-style "fg=#{@ctp_blue}"
set  -g  message-style            "bg=#{@ctp_surface0},fg=#{@ctp_text}"
set  -g  message-command-style    "bg=#{@ctp_surface0},fg=#{@ctp_text}"
set  -g  mode-style               "bg=#{@ctp_blue},fg=#{@ctp_base}"
set  -g  clock-mode-colour        "#89b4fa"

# Popup styling (tmux 3.3+)
set  -g  popup-border-style       "fg=#{@ctp_surface2}"
set  -g  popup-border-lines       rounded
